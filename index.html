<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vortex Code Tester </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0c0b13;
            font-family: 'Segoe UI', 'Fira Code', 'JetBrains Mono', monospace;
            height: 100vh;
            overflow: hidden;
        }

        /* Main container - full desktop mode */
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 16px;
            gap: 14px;
        }

        /* TOP BAR - tombol run di atas */
        .top-bar {
            background: #12101c;
            border-radius: 20px;
            border: 1px solid #3a2a6e;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            backdrop-filter: blur(2px);
        }

        .brand {
            display: flex;
            align-items: baseline;
            gap: 12px;
        }

        .brand h2 {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #c084fc, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .mode-badge {
            background: #1e1730;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #c4a8ff;
            border-left: 2px solid #a066ff;
        }

        /* Kelompok tombol run dan lainnya */
        .action-group {
            display: flex;
            gap: 12px;
        }

        button {
            background: #23202e;
            border: none;
            padding: 8px 24px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            font-family: monospace;
            transition: 0.15s;
            color: #e2d6ff;
            border: 1px solid #5a3f9e;
        }

        button#runBtn {
            background: #6b2fd4;
            border-color: #b87eff;
            color: white;
            box-shadow: 0 0 6px #a55eff;
        }

        button#runBtn:hover {
            background: #8548ec;
            transform: scale(1.02);
            box-shadow: 0 0 12px #b77eff;
        }

        button:hover {
            background: #3a2c5a;
            border-color: #9b6eff;
            color: white;
        }

        /* LAYOUT UTAMA: kiri (editor) dan kanan (preview) */
        .main-layout {
            display: flex;
            flex: 1;
            gap: 16px;
            min-height: 0;
            overflow: hidden;
        }

        /* Panel Kiri: Tempat ngetes kode */
        .editor-panel {
            flex: 1;
            background: #0a0812;
            border-radius: 24px;
            border: 1px solid #382a62;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 6px 14px rgba(0,0,0,0.4);
        }

        .panel-header {
            background: #100e1e;
            padding: 10px 18px;
            font-size: 0.75rem;
            font-weight: 600;
            border-bottom: 1px solid #2d2354;
            color: #cfb9ff;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
        }

        textarea {
            flex: 1;
            background: #03020a;
            color: #f0eaff;
            border: none;
            padding: 18px;
            font-family: 'Fira Code', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.55;
            resize: none;
            outline: none;
            tab-size: 4;
        }

        textarea::selection {
            background: #7c3aed80;
        }

        /* Panel Kanan: Hasil Run */
        .preview-panel {
            flex: 1;
            background: #0f0d19;
            border-radius: 24px;
            border: 1px solid #4a3680;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 6px 14px rgba(0,0,0,0.4);
        }

        .preview-header {
            background: #100e1e;
            padding: 10px 18px;
            font-size: 0.75rem;
            font-weight: 600;
            border-bottom: 1px solid #2d2354;
            color: #cfb9ff;
            display: flex;
            justify-content: space-between;
        }

        iframe {
            flex: 1;
            width: 100%;
            border: none;
            background: white;
        }

        /* scroll styling */
        textarea::-webkit-scrollbar {
            width: 6px;
        }
        textarea::-webkit-scrollbar-track {
            background: #19152b;
        }
        textarea::-webkit-scrollbar-thumb {
            background: #9b6eff;
            border-radius: 8px;
        }

        /* Responsif tetap menjaga desktop-first, jika layar kecil jadi kolom */
        @media (max-width: 750px) {
            .main-layout {
                flex-direction: column;
            }
            .top-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .action-group {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <!-- Bagian Atas: Tombol RUN dan kontrol -->
    <div class="top-bar">
        <div class="brand">
            <h2>◈ VORTEX · HTML TESTER</h2>
            <div class="mode-badge">◉ Mode Desktop | Kiri | Kanan</div>
        </div>
        <div class="action-group">
            <button id="runBtn">▶ RUN / JALANKAN</button>
            <button id="resetDemoBtn">⟳ RESET CODE BAWAAN</button>
            <button id="clearEditorBtn">🗑 CLEAR</button>
        </div>
    </div>

    <!-- Layout utama: KIRI (editor) + KANAN (hasil preview) -->
    <div class="main-layout">
        <!-- Panel Kiri: Tempat nulis kode HTML full -->
        <div class="editor-panel">
            <div class="panel-header">
                <span>✍️ KODE HTML </span>
                <span style="font-size: 10px;">&lt;html&gt; &lt;style&gt; &lt;script&gt; semua support</span>
            </div>
            <textarea id="htmlEditor" spellcheck="false" placeholder="Tulis kode HTML, CSS, JavaScript di sini ...&#10;&#10;Contoh:&#10;&lt;h1 style=&quot;color: #a855f7;&quot;&gt;Halo Dunia!&lt;/h1&gt;&#10;&lt;button onclick=&quot;alert('Vortex aktif')&quot;&gt;Klik&lt;/button&gt;"></textarea>
        </div>

        <!-- Panel Kanan: Hasil Run -->
        <div class="preview-panel">
            <div class="preview-header">
                <span>✨ HASIL RUN </span>
                <span style="font-size: 10px;">render realtime saat tekan RUN</span>
            </div>
            <iframe id="livePreview" title="hasil preview" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
        </div>
    </div>
</div>

<script>
    // Ambil semua elemen
    const editorTextarea = document.getElementById('htmlEditor');
    const previewIframe = document.getElementById('livePreview');
    const runBtn = document.getElementById('runBtn');
    const resetBtn = document.getElementById('resetDemoBtn');
    const clearBtn = document.getElementById('clearEditorBtn');

    // ------------------ KODE DEMO YANG BERSIH (tidak aneh, hanya contoh) ------------------
    const defaultHTMLCode = `<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Demo - Vortex Tester</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, 'Segoe UI', sans-serif;
            background: linear-gradient(145deg, #f9f5ff 0%, #ede7ff 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            padding: 2rem;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 35px rgba(106, 40, 220, 0.2);
            border: 1px solid #c7b0ff;
            text-align: center;
        }
        h1 {
            color: #6c2bd6;
            font-size: 2rem;
            margin-bottom: 12px;
        }
        p {
            color: #2a1b4a;
            margin: 15px 0;
            line-height: 1.5;
        }
        button {
            background: #8b5cf6;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            margin-top: 10px;
        }
        button:hover {
            background: #6d28d9;
            transform: scale(1.02);
            box-shadow: 0 5px 12px #ac7aff;
        }
        code {
            background: #ede4ff;
            padding: 3px 8px;
            border-radius: 20px;
            font-family: monospace;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #5a4893;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🌀 Vortex Tester</h1>
        <p>✅ Editor <strong>kiri</strong> → Hasil <strong>kanan</strong><br>Klik RUN atau <kbd>Ctrl+Enter</kbd> untuk menjalankan kode.</p>
        <button id="demoBtn">✨ Coba Klik Ini ✨</button>
        <p id="message"></p>
        <div class="footer">
            💡 Tulis HTML apa saja di editor kiri, lalu tekan RUN
        </div>
    </div>
    <script>
        const btn = document.getElementById('demoBtn');
        const msg = document.getElementById('message');
        btn.addEventListener('click', () => {
            msg.innerHTML = '✅ Tombol berfungsi! Kode JS jalan sempurna.';
            msg.style.color = "#6c2bd6";
            msg.style.fontWeight = "bold";
            setTimeout(() => {
                msg.innerHTML = "";
            }, 1500);
        });
    <\/script>
</body>
</html>`;

    // Fungsi render kode HTML ke iframe
    function renderToIframe(htmlString) {
        const iframe = previewIframe;
        // Gunakan blob agar benar-benar render HTML utuh
        const blob = new Blob([htmlString], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        iframe.src = url;
        // revoke object URL setelah iframe selesai loading untuk efisiensi memori
        iframe.onload = () => {
            URL.revokeObjectURL(url);
        };
    }

    // Simpan ke localStorage
    function saveCodeToLocal() {
        const currentCode = editorTextarea.value;
        localStorage.setItem('vortex_html_full_tester', currentCode);
    }

    // Muat dari localStorage atau default
    function loadCodeFromLocal() {
        const savedCode = localStorage.getItem('vortex_html_full_tester');
        if (savedCode && savedCode.trim() !== "") {
            editorTextarea.value = savedCode;
            renderToIframe(savedCode);
        } else {
            editorTextarea.value = defaultHTMLCode;
            renderToIframe(defaultHTMLCode);
        }
    }

    // Fungsi menjalankan kode (RUN)
    function runCode() {
        const codeToRun = editorTextarea.value;
        renderToIframe(codeToRun);
        saveCodeToLocal();  // simpan perubahan setelah run
        // efek visual tombol
        runBtn.style.transform = "scale(0.97)";
        setTimeout(() => { runBtn.style.transform = ""; }, 120);
    }

    // Reset ke contoh default (demo bersih)
    function resetToDefault() {
        editorTextarea.value = defaultHTMLCode;
        renderToIframe(defaultHTMLCode);
        saveCodeToLocal();
    }

    // Clear editor (kosongkan tapi menampilkan pesan kosong yang sopan)
    function clearEditorContent() {
        // Untuk clear, isi dengan HTML kosong standar (tidak error)
        const emptyHtml = `<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Kosong - Vortex</title><style>body{font-family: monospace; display:flex; justify-content:center; align-items:center; height:100vh; background:#f7f3ff; color:#4a2a8a;}</style></head>
<body>
<div style="text-align:center;">
    <h2>📄 Belum ada kode</h2>
    <p>Tulis HTML/CSS/JS di editor <strong>sebelah kiri</strong> lalu klik <strong>RUN</strong></p>
    <p style="font-size:12px;">Ctrl+Enter untuk menjalankan cepat</p>
</div>
</body>
</html>`;
        editorTextarea.value = "";
        renderToIframe(emptyHtml);
        saveCodeToLocal();
    }

    // Shortcut Ctrl+Enter untuk run
    function handleShortcut(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
            e.preventDefault();
            runCode();
        }
    }

    // Event listener & auto-save saat mengetik (tanpa auto-render biar user kontrol penuh)
    editorTextarea.addEventListener('input', () => {
        saveCodeToLocal();
    });

    editorTextarea.addEventListener('keydown', handleShortcut);
    runBtn.addEventListener('click', runCode);
    resetBtn.addEventListener('click', resetToDefault);
    clearBtn.addEventListener('click', clearEditorContent);

    // inisialisasi saat window load
    window.addEventListener('DOMContentLoaded', () => {
        loadCodeFromLocal();
        // tambahan indicator bahwa mode desktop aktif
        console.log("Vortex Tester Aktif | Editor Kiri → Preview Kanan | Tombol Run di atas");
    });
</script>
</body>
</html>
