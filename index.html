<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HTML Tester | By VORTEX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            font-family: 'Segoe UI', 'Fira Code', monospace;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 16px;
            gap: 12px;
        }

        /* Tombol di atas */
        .top-bar {
            background: rgba(18, 16, 28, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            border: 1px solid #3a2a5e;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            flex-shrink: 0;
            z-index: 10;
        }

        .title h1 {
            font-size: 1.2rem;
            color: #b87cff;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            background: #6b2fd4;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            color: white;
            font-family: monospace;
        }

        button:hover {
            background: #8548ec;
        }

        #clearBtn {
            background: #2d1f4e;
            border: 1px solid #7a55c9;
        }

        #clearBtn:hover {
            background: #4a2f7a;
        }

        /* Container dengan resize */
        .main-container {
            display: flex;
            flex: 1;
            min-height: 0;
            gap: 0;
        }

        /* Panel Editor - background video KELIATAN */
        .editor-panel {
            width: 50%;
            border-radius: 16px 0 0 16px;
            border: 1px solid #332457;
            border-right: none;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* VIDEO BACKGROUND - opacity 0.7 biar keliatan banget */
        .video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0.7;
            pointer-events: none;
        }

        /* textarea pake background transparan + blur biar teks kebaca */
        textarea {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            color: #ffffff;
            border: none;
            padding: 16px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.5;
            resize: none;
            outline: none;
            position: relative;
            z-index: 2;
            backdrop-filter: blur(3px);
            font-weight: 500;
            text-shadow: 0 0 2px black;
        }

        /* RESIZE HANDLE */
        .resize-handle {
            width: 6px;
            background: #4a3680;
            cursor: ew-resize;
            transition: 0.1s;
            flex-shrink: 0;
            position: relative;
            z-index: 10;
        }

        .resize-handle:hover {
            background: #b87eff;
            width: 8px;
        }

        /* Panel Hasil */
        .preview-panel {
            background: #0f0d19;
            border-radius: 0 16px 16px 0;
            border: 1px solid #4a3680;
            border-left: none;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            width: 50%;
        }

        iframe {
            flex: 1;
            width: 100%;
            border: none;
            background: white;
        }

        textarea::selection {
            background: #7c3aed;
        }

        textarea::-webkit-scrollbar {
            width: 5px;
        }
        textarea::-webkit-scrollbar-track {
            background: #1b162b;
        }
        textarea::-webkit-scrollbar-thumb {
            background: #7b51cf;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="top-bar">
        <div class="title">
            <h1>◈ HTML TESTER | By VORTEX</h1>
        </div>
        <div class="btn-group">
            <button id="clearBtn">🗑 CLEAR CODE</button>
            <button id="runBtn">▶ RUN</button>
        </div>
    </div>

    <div class="main-container" id="mainContainer">
        <div class="editor-panel" id="editorPanel">
            <!-- VIDEO BACKGROUND - KELIATAN LANGSUNG -->
            <video id="bgVideo" class="video-background" autoplay loop muted playsinline>
                <source src="https://files.catbox.moe/mp3fu3.mp4" type="video/mp4">
            </video>
            <textarea id="htmlCode" spellcheck="false" placeholder="Tulis kode HTML di sini...&#10;&#10;Contoh:&#10;&lt;h1 style=&quot;color: #b87cff;&quot;&gt;Halo!&lt;/h1&gt;&#10;&lt;button onclick=&quot;alert('Test')&quot;&gt;Klik&lt;/button&gt;"></textarea>
        </div>
        <div class="resize-handle" id="resizeHandle"></div>
        <div class="preview-panel" id="previewPanel">
            <iframe id="resultFrame" title="hasil" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>
        </div>
    </div>
</div>

<script>
    const editor = document.getElementById('htmlCode');
    const iframe = document.getElementById('resultFrame');
    const runBtn = document.getElementById('runBtn');
    const clearBtn = document.getElementById('clearBtn');
    const bgVideo = document.getElementById('bgVideo');

    // Default code contoh
    const defaultCode = `<h1 style="color: #b87cff; font-family: sans-serif;">✨ HTML Tester Siap!</h1>
<p>Tulis kode di editor kiri, tekan RUN.</p>
<button onclick="alert('Tombol berfungsi!')">Klik Aku</button>
<style>
  body { font-family: Arial; padding: 20px; background: rgba(255,255,255,0.9); border-radius: 20px; margin: 20px; }
  button { background: #8b5cf6; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; }
</style>`;

    function renderHTML(code) {
        const blob = new Blob([code], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        iframe.src = url;
        iframe.onload = () => URL.revokeObjectURL(url);
    }

    function saveCode() {
        localStorage.setItem('html_tester_code', editor.value);
    }

    function loadCode() {
        const saved = localStorage.getItem('html_tester_code');
        if (saved && saved.trim()) {
            editor.value = saved;
            renderHTML(saved);
        } else {
            editor.value = defaultCode;
            renderHTML(defaultCode);
        }
    }

    function runCode() {
        renderHTML(editor.value);
        saveCode();
    }

    function clearCode() {
        editor.value = '';
        const emptyHtml = `<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Kosong</title></head>
<body style="font-family: monospace; padding: 20px; background: #faf9ff;">
  <h3>📄 Kode kosong</h3>
  <p>Tulis HTML di editor lalu klik RUN</p>
</body>
</html>`;
        renderHTML(emptyHtml);
        saveCode();
    }

    // Shortcut Ctrl+Enter
    editor.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
            e.preventDefault();
            runCode();
        }
    });

    editor.addEventListener('input', saveCode);
    runBtn.addEventListener('click', runCode);
    clearBtn.addEventListener('click', clearCode);

    // ========== RESIZE ==========
    const container = document.getElementById('mainContainer');
    const editorPanel = document.getElementById('editorPanel');
    const previewPanel = document.getElementById('previewPanel');
    const handle = document.getElementById('resizeHandle');

    let isResizing = false;

    handle.addEventListener('mousedown', (e) => {
        isResizing = true;
        document.body.style.cursor = 'ew-resize';
        e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
        if (!isResizing) return;
        
        const containerRect = container.getBoundingClientRect();
        let newEditorWidth = e.clientX - containerRect.left;
        const minWidth = 200;
        const maxWidth = containerRect.width - 200;
        
        if (newEditorWidth >= minWidth && newEditorWidth <= maxWidth) {
            editorPanel.style.width = newEditorWidth + 'px';
            previewPanel.style.width = `calc(100% - ${newEditorWidth + 6}px)`;
        }
    });

    document.addEventListener('mouseup', () => {
        isResizing = false;
        document.body.style.cursor = '';
    });

    // Inisialisasi
    loadCode();
</script>
</body>
</html>
