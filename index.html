<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VORTEX | HTML Tester</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0f;
            font-family: 'Segoe UI', 'Fira Code', monospace;
            height: 100vh;
            overflow: hidden;
        }

        /* ========== MENU PILIH MODE ========== */
        .menu-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            gap: 30px;
            background: radial-gradient(circle at 30% 20%, #1a0f2e, #0a0a0f);
        }

        .menu-container h1 {
            font-size: 3rem;
            color: #b87cff;
            text-shadow: 0 0 20px #a855f7;
            letter-spacing: 3px;
        }

        .menu-container p {
            color: #a08bc2;
            margin-bottom: 20px;
        }

        .mode-buttons {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-card {
            background: rgba(18, 16, 28, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #6b44b0;
            border-radius: 32px;
            padding: 40px 50px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            width: 280px;
        }

        .mode-card:hover {
            transform: scale(1.05);
            border-color: #c084fc;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.4);
            background: rgba(30, 25, 55, 0.9);
        }

        .mode-card h2 {
            font-size: 2rem;
            color: #c084fc;
            margin-bottom: 15px;
        }

        .mode-card p {
            font-size: 0.85rem;
            color: #b8a6e0;
        }

        .mode-card small {
            display: block;
            margin-top: 20px;
            color: #7a6aa0;
            font-size: 0.7rem;
        }

        /* ========== TEMPAT TESTER ========== */
        .tester-container {
            display: none;
            flex-direction: column;
            height: 100vh;
            padding: 16px;
            gap: 12px;
        }

        .tester-container.active {
            display: flex;
        }

        /* Top bar */
        .top-bar {
            background: rgba(18, 16, 28, 0.9);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            border: 1px solid #3a2a5e;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            flex-shrink: 0;
        }

        .title h1 {
            font-size: 1.2rem;
            color: #b87cff;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            background: #6b2fd4;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            color: white;
            font-family: monospace;
            transition: 0.1s;
        }

        button:hover {
            background: #8548ec;
            transform: scale(1.02);
        }

        .btn-back {
            background: #2d1f4e;
            border: 1px solid #7a55c9;
        }

        .btn-back:hover {
            background: #4a2f7a;
        }

        .btn-run {
            background: #6b2fd4;
        }

        .btn-clear {
            background: #2d1f4e;
            border: 1px solid #dc2626;
        }

        .btn-clear:hover {
            background: #991b1b;
        }

        /* Layout split mode 1 */
        .main-container {
            display: flex;
            flex: 1;
            min-height: 0;
            gap: 0;
        }

        .editor-panel {
            width: 50%;
            border-radius: 16px 0 0 16px;
            border: 1px solid #332457;
            border-right: none;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0.7;
            pointer-events: none;
        }

        textarea {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            color: #ffffff;
            border: none;
            padding: 16px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            line-height: 1.5;
            resize: none;
            outline: none;
            position: relative;
            z-index: 2;
            backdrop-filter: blur(3px);
        }

        .resize-handle {
            width: 6px;
            background: #4a3680;
            cursor: ew-resize;
            transition: 0.1s;
            flex-shrink: 0;
        }

        .resize-handle:hover {
            background: #b87eff;
            width: 8px;
        }

        .preview-panel {
            background: #0f0d19;
            border-radius: 0 16px 16px 0;
            border: 1px solid #4a3680;
            border-left: none;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            width: 50%;
        }

        iframe {
            flex: 1;
            width: 100%;
            border: none;
            background: white;
        }

        /* ========== MODE 2 ========== */
        .mode2-full {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 16px;
            border: 1px solid #332457;
            position: relative;
        }

        .mode2-full .video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0.5;
            pointer-events: none;
        }

        .mode2-full textarea {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(3px);
            z-index: 2;
            font-size: 14px;
        }

        .mode2-full iframe {
            flex: 1;
            width: 100%;
            border: none;
            background: white;
        }
    </style>
</head>
<body>
    <!-- MENU PILIH MODE -->
    <div class="menu-container" id="menuContainer">
        <h1>◈ VORTEX</h1>
        <p>Pilih mode testing HTML</p>
        <div class="mode-buttons">
            <div class="mode-card" data-mode="split">
                <h2> MODE 1</h2>
                <p>Split View</p>
                <small>Editor kiri · Hasil kanan </small>
            </div>
            <div class="mode-card" data-mode="full">
                <h2> MODE 2</h2>
                <p>Code → Hasil</p>
                <small>Cocok Buat Cek Tampilan Full </small>
            </div>
        </div>
    </div>

    <!-- TEMPAT TESTER -->
    <div id="testerArea"></div>

    <script>
        const menuContainer = document.getElementById('menuContainer');
        const testerArea = document.getElementById('testerArea');
        let currentMode = null;

        // ========== MODE 1: SPLIT VIEW ==========
        function initSplitMode() {
            const html = `
            <div class="tester-container active" id="splitTester">
                <div class="top-bar">
                    <div class="title">
                        <h1>◈ MODE 1 | SPLIT VIEW</h1>
                    </div>
                    <div class="btn-group">
                        <button id="clearBtnSplit" class="btn-clear"> CLEAR</button>
                        <button id="runBtnSplit" class="btn-run">▶ RUN</button>
                        <button id="backMenuSplit" class="btn-back"> MENU</button>
                    </div>
                </div>
                <div class="main-container" id="mainContainerSplit">
                    <div class="editor-panel" id="editorPanelSplit">
                        <video class="video-background" autoplay loop muted playsinline>
                            <source src="https://files.catbox.moe/mp3fu3.mp4" type="video/mp4">
                        </video>
                        <textarea id="htmlCodeSplit" spellcheck="false" placeholder="Tulis kode HTML di sini..."></textarea>
                    </div>
                    <div class="resize-handle" id="resizeHandleSplit"></div>
                    <div class="preview-panel" id="previewPanelSplit">
                        <iframe id="resultFrameSplit" title="hasil" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>
                    </div>
                </div>
            </div>
            `;
            testerArea.innerHTML = html;

            const editor = document.getElementById('htmlCodeSplit');
            const iframe = document.getElementById('resultFrameSplit');
            const runBtn = document.getElementById('runBtnSplit');
            const clearBtn = document.getElementById('clearBtnSplit');
            const backBtn = document.getElementById('backMenuSplit');

            const defaultCode = `<h1 style="color: #b87cff; font-family: sans-serif;">✨ Mode Split Aktif!</h1>
<p>Tulis kode HTML di kiri, tekan RUN.</p>
<button onclick="alert('Tombol berfungsi!')">Klik Aku</button>
<style>
  body { font-family: Arial; padding: 20px; background: #f5f0ff; text-align:center; }
  button { background: #8b5cf6; color: white; border: none; padding: 10px 20px; border-radius: 30px; cursor: pointer; }
</style>`;

            function render() {
                const code = editor.value;
                const blob = new Blob([code], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                iframe.src = url;
                iframe.onload = () => URL.revokeObjectURL(url);
                localStorage.setItem('split_code', code);
            }

            function load() {
                const saved = localStorage.getItem('split_code');
                editor.value = (saved && saved.trim()) ? saved : defaultCode;
                render();
            }

            runBtn.onclick = render;
            clearBtn.onclick = () => { editor.value = ''; render(); };
            backBtn.onclick = () => backToMenu();
            editor.oninput = () => localStorage.setItem('split_code', editor.value);
            editor.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') render();
            });

            // Resize handle
            const container = document.getElementById('mainContainerSplit');
            const editorPanel = document.getElementById('editorPanelSplit');
            const previewPanel = document.getElementById('previewPanelSplit');
            const handle = document.getElementById('resizeHandleSplit');
            let isResizing = false;

            handle.onmousedown = (e) => {
                isResizing = true;
                document.body.style.cursor = 'ew-resize';
                e.preventDefault();
            };
            document.onmousemove = (e) => {
                if (!isResizing) return;
                const rect = container.getBoundingClientRect();
                let w = e.clientX - rect.left;
                w = Math.min(Math.max(w, 200), rect.width - 200);
                editorPanel.style.width = w + 'px';
                previewPanel.style.width = `calc(100% - ${w + 6}px)`;
            };
            document.onmouseup = () => {
                isResizing = false;
                document.body.style.cursor = '';
            };
            handle.ondblclick = () => {
                editorPanel.style.width = '50%';
                previewPanel.style.width = '50%';
            };

            load();
        }

        // ========== MODE 2: CODE DULU, RUN -> HASIL, BACK -> CODE ==========
        function initFullMode() {
            const html = `
            <div class="tester-container active" id="fullTester">
                <div class="top-bar">
                    <div class="title">
                        <h1>◈ MODE 2 | CODE → HASIL</h1>
                    </div>
                    <div class="btn-group" id="mode2BtnGroup">
                        <button id="clearMode2TopBtn" class="btn-clear"> CLEAR</button>
                        <button id="runMode2TopBtn" class="btn-run">▶ RUN</button>
                        <button id="backToCodeTopBtn" class="btn-back" style="display:none;">◀ BACK KE CODE</button>
                        <button id="backMenuFull" class="btn-back"> MENU</button>
                    </div>
                </div>
                <div id="mode2Content" style="flex:1; display:flex; flex-direction:column; min-height:0;">
                    <!-- Akan diisi dinamis: editor atau hasil -->
                </div>
            </div>
            `;
            testerArea.innerHTML = html;

            const mode2Content = document.getElementById('mode2Content');
            const backMenuBtn = document.getElementById('backMenuFull');
            const backToCodeTopBtn = document.getElementById('backToCodeTopBtn');
            const runTopBtn = document.getElementById('runMode2TopBtn');
            const clearTopBtn = document.getElementById('clearMode2TopBtn');
            
            let currentView = 'editor'; // 'editor' atau 'preview'
            let currentCode = localStorage.getItem('mode2_code') || `<h1 style="color: #b87cff; font-family: sans-serif;">✨ Mode 2 Aktif!</h1>
<p>Tulis kode di editor, tekan RUN untuk liat hasil full screen.</p>
<button onclick="alert('Tombol berfungsi!')">Klik Aku</button>
<style>
  body { font-family: Arial; padding: 40px; background: linear-gradient(145deg, #f5f0ff, #e8ddff); text-align:center; }
  button { background: #8b5cf6; color: white; border: none; padding: 12px 24px; border-radius: 30px; cursor: pointer; margin-top:20px; }
</style>`;

            // Fungsi render editor
            function showEditor() {
                currentView = 'editor';
                backToCodeTopBtn.style.display = 'none';
                runTopBtn.style.display = 'inline-block';
                clearTopBtn.style.display = 'inline-block';
                mode2Content.innerHTML = `
                    <div class="mode2-full" style="flex:1; display:flex; flex-direction:column; position:relative;">
                        <video class="video-background" autoplay loop muted playsinline>
                            <source src="https://files.catbox.moe/mp3fu3.mp4" type="video/mp4">
                        </video>
                        <textarea id="mode2Editor" spellcheck="false" placeholder="Tulis kode HTML di sini..." style="flex:1; background:rgba(0,0,0,0.6); color:white; backdrop-filter:blur(3px); padding:20px; font-family:'Fira Code',monospace; font-size:14px; border:none; resize:none; outline:none;">${currentCode}</textarea>
                    </div>
                `;
                const editorTextarea = document.getElementById('mode2Editor');
                
                editorTextarea.addEventListener('input', () => {
                    currentCode = editorTextarea.value;
                    localStorage.setItem('mode2_code', currentCode);
                });
            }
            
            // Fungsi render hasil full screen
            function showPreview() {
                currentView = 'preview';
                backToCodeTopBtn.style.display = 'inline-block';
                runTopBtn.style.display = 'none';
                clearTopBtn.style.display = 'none';
                mode2Content.innerHTML = `
                    <div class="mode2-full" style="flex:1; display:flex; flex-direction:column; position:relative;">
                        <iframe id="mode2Preview" title="hasil" sandbox="allow-same-origin allow-scripts allow-popups allow-forms" style="flex:1; width:100%; border:none; background:white;"></iframe>
                    </div>
                `;
                const iframe = document.getElementById('mode2Preview');
                
                // Render HTML ke iframe
                const blob = new Blob([currentCode], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                iframe.src = url;
                iframe.onload = () => URL.revokeObjectURL(url);
            }
            
            // Fungsi CLEAR
            function clearCode() {
                currentCode = '';
                localStorage.setItem('mode2_code', '');
                if (currentView === 'editor') {
                    const editorTextarea = document.getElementById('mode2Editor');
                    if (editorTextarea) {
                        editorTextarea.value = '';
                    }
                }
                // Tampilkan HTML kosong di preview jika sedang di preview
                if (currentView === 'preview') {
                    const emptyHtml = `<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Kosong</title></head>
<body style="font-family: monospace; padding: 20px; background: #faf9ff;">
  <h3>📄 Kode kosong</h3>
  <p>Tulis HTML di editor lalu klik RUN</p>
</body>
</html>`;
                    const blob = new Blob([emptyHtml], { type: 'text/html' });
                    const url = URL.createObjectURL(blob);
                    const iframe = document.getElementById('mode2Preview');
                    if (iframe) {
                        iframe.src = url;
                        iframe.onload = () => URL.revokeObjectURL(url);
                    }
                }
            }
            
            // Fungsi RUN dari tombol atas
            function runCode() {
                // Ambil code terbaru dari editor jika sedang di editor view
                if (currentView === 'editor') {
                    const editorTextarea = document.getElementById('mode2Editor');
                    if (editorTextarea) {
                        currentCode = editorTextarea.value;
                        localStorage.setItem('mode2_code', currentCode);
                    }
                }
                showPreview();
            }
            
            // Event tombol
            runTopBtn.onclick = () => runCode();
            clearTopBtn.onclick = () => clearCode();
            backToCodeTopBtn.onclick = () => showEditor();
            backMenuBtn.onclick = () => backToMenu();
            
            // Tampilkan editor di awal
            showEditor();
        }

        function backToMenu() {
            testerArea.innerHTML = '';
            menuContainer.style.display = 'flex';
            currentMode = null;
        }

        // Event listener pilih mode
        document.querySelectorAll('.mode-card').forEach(card => {
            card.addEventListener('click', () => {
                const mode = card.getAttribute('data-mode');
                currentMode = mode;
                menuContainer.style.display = 'none';
                
                if (mode === 'split') {
                    initSplitMode();
                } else if (mode === 'full') {
                    initFullMode();
                }
            });
        });
    </script>
</body>
</html>
